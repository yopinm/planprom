name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel in-progress runs for the same branch — stops spam from rapid pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check, Lint, Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 50

      - name: Test
        run: npm run test

      - name: Summary
        if: failure()
        run: |
          echo "## CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\` | Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Check the steps above for the failing step." >> $GITHUB_STEP_SUMMARY
